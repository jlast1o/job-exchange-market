<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Auction – Тест API</title>
    <!-- Pico.css – минимальный красивый стиль -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        .container { max-width: 500px; margin-top: 3rem; }
        .result { margin-top: 1.5rem; padding: 1rem; background: #f8f9fa; border-radius: 8px; }
        .error { background: #ffe6e6; color: #b30000; }
        .hidden { display: none; }
        pre { white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <main class="container">
        <h1>🔁 Reverse Auction API Tester</h1>

        <!-- Форма регистрации -->
        <section>
            <h2>Регистрация</h2>
            <form id="register-form">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" required>
                <label for="reg-password">Пароль (мин. 8 символов)</label>
                <input type="password" id="reg-password" minlength="8" required>
                <label for="reg-name">Полное имя</label>
                <input type="text" id="reg-name">
                <label for="reg-role">Роль</label>
                <select id="reg-role">
                    <option value="user">Заказчик (user)</option>
                    <option value="executor">Исполнитель (executor)</option>
                </select>
                <button type="submit">Зарегистрироваться</button>
            </form>
        </section>

        <!-- Форма логина -->
        <section>
            <h2>Вход</h2>
            <form id="login-form">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" required>
                <label for="login-password">Пароль</label>
                <input type="password" id="login-password" required>
                <button type="submit">Войти</button>
            </form>
        </section>

        <!-- Блок для результата -->
        <section id="result-section" class="hidden">
            <h2>Результат</h2>
            <div id="result" class="result"></div>
        </section>
    </main>

    <script>
        const API = '/api/v1/auth';

        // Вспомогательная функция для отображения результата
        function showResult(data, isError = false) {
            const section = document.getElementById('result-section');
            const div = document.getElementById('result');
            section.classList.remove('hidden');
            if (isError) {
                div.className = 'result error';
                div.innerHTML = `<strong>Ошибка:</strong> ${data}`;
            } else {
                div.className = 'result';
                div.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
        }

        // Обработчик регистрации
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                full_name: document.getElementById('reg-name').value,
                role: document.getElementById('reg-role').value
            };
            try {
                const res = await fetch(`${API}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.error || 'Ошибка сервера');
                showResult(json);
            } catch (err) {
                showResult(err.message, true);
            }
        });

        // Обработчик логина
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const json = await res.json();
                if (!res.ok) throw new Error(json.error || 'Ошибка сервера');
                showResult(json);
            } catch (err) {
                showResult(err.message, true);
            }
        });
    </script>
</body>
</html>
