version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: auction-db
    environment:
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auctionpass
      POSTGRES_DB: auction
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: